# Rust Edge Gateway Nginx Configuration
# Generated configuration with domain placeholders that get replaced during deployment
#
# Domains:
#   - {{TARGET_DOMAIN}} - Admin UI and management API
#   - {{DOCS_DOMAIN}} - Documentation site
#   - Catch-all - Dynamic endpoint routing via gateway

# ============================================================================
# Admin Domain - {{TARGET_DOMAIN}} (HTTP)
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name {{TARGET_DOMAIN}};

    # Allow Let's Encrypt challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS if cert exists, otherwise serve directly
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# Admin Domain - {{TARGET_DOMAIN}} (HTTPS)
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{TARGET_DOMAIN}};

    ssl_certificate /etc/letsencrypt/live/{{TARGET_DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{TARGET_DOMAIN}}/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # Admin UI
    location /admin {
        proxy_pass http://127.0.0.1:8081/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin API - all management endpoints
    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root redirects to admin
    location = / {
        return 301 /admin/;
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================================
# Docs Domain - {{DOCS_DOMAIN}} (HTTP)
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name {{DOCS_DOMAIN}};

    # Allow Let's Encrypt challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# Docs Domain - {{DOCS_DOMAIN}} (HTTPS)
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{DOCS_DOMAIN}};

    ssl_certificate /etc/letsencrypt/live/{{DOCS_DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOCS_DOMAIN}}/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve mdBook documentation
    root /var/www/rust-edge-gateway-docs;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ============================================================================
# Default HTTPS Catch-All - Returns 404 for unknown domains
# This MUST load before other SSL configs alphabetically (use 00-default name)
# ============================================================================
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    # Use iffuso.com cert as fallback
    ssl_certificate /etc/letsencrypt/live/iffuso.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iffuso.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Return 404 for unknown domains, or optionally redirect to iffuso.com
    location / {
        return 404;
    }
}

# ============================================================================
# Default HTTP Catch-All - Dynamic Endpoint Routing via Gateway
# ============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow Let's Encrypt challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 50M;

    # All requests go to Rust Edge Gateway for dynamic routing
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
}

